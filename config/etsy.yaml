# Aurora Etsy draft integration configuration.
# Secrets must never be committed.
# Use environment variables:
# ETSY_SHOP_ID
# ETSY_CLIENT_ID
# ETSY_SHARED_SECRET
# ETSY_ACCESS_TOKEN
#
# Sprint 16 defaults to mock mode so the Etsy API is not called locally.

mode: live
shop_id:
client_id:
shared_secret:
access_token:
api_base_url: https://openapi.etsy.com/v3/application
# ProductFactory supplies job-specific merchant pricing.
# Keep this unset/zero so live drafts cannot silently fall back to one global price.
default_price: 0.0
default_quantity: 999
taxonomy_id: 1250
processing_profile_id:
shipping_profile_id:
